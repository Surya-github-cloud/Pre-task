<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Repository Analyzer</title>
<script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3B82F6',
                        surface: '#F9FAFB',
                        card: '#FFFFFF',
                        section: '#F3F4F6',
                        textPrimary: '#111827',
                        textSecondary: '#4B5563',
                        textLight: '#9CA3AF',
                        borderLight: '#E5E7EB',
                        starYellow: '#FBBF24'
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .repo-card { transition: all 0.3s ease; }
        .repo-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
.difficulty-beginner { background: linear-gradient(135deg, #10b981, #059669); }
.difficulty-intermediate { background: linear-gradient(135deg, #f59e0b, #d97706); }
.difficulty-advanced { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .difficulty-intermediate { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .difficulty-advanced { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .score-bar { background: linear-gradient(90deg, #3b82f6, #1d4ed8); }
    </style>
</head>

    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <!-- Header -->
        <div class="text-center mb-12">
            <div class="inline-flex items-center bg-white/80 backdrop-blur-xl rounded-2xl px-8 py-4 shadow-2xl">
                <i class="fas fa-code-branch text-4xl text-blue-600 mr-4"></i>
                <div>
                    <h1 class="text-4xl md:text-5xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent mb-2">
                        GitHub Repository Analyzer
                    </h1>
                    <p class="text-xl text-gray-600 font-medium">Analyze repos for activity, complexity & learning difficulty</p>
                </div>
            </div>
        </div>

        <!-- Input Section -->
        <div class="bg-white/70 backdrop-blur-xl rounded-3xl shadow-2xl p-8 mb-12">
            <div class="max-w-2xl mx-auto">
                <div class="grid md:grid-cols-2 gap-6 mb-6">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Single Repository</label>
                        <div class="relative">
                            <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                            <input type="text" id="singleRepo" placeholder="owner/repo (e.g., facebook/react)" 
                                   class="w-full pl-12 pr-4 py-4 border-2 border-gray-200 rounded-2xl focus:border-blue-400 focus:ring-4 focus:ring-blue-100 transition-all duration-300 text-lg">
                        </div>
                        <button onclick="analyzeSingle()" 
                                class="mt-4 w-full bg-gradient-to-r from-blue-500 to-blue-600 hover:from-blue-600 hover:to-blue-700 text-white font-bold py-4 px-8 rounded-2xl shadow-xl hover:shadow-2xl transform hover:-translate-y-1 transition-all duration-300 text-lg">
                            <i class="fas fa-magic mr-2"></i>Analyze Repo
                        </button>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Batch Analysis (max 10)</label>
                        <div class="relative">
                            <i class="fas fa-list absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                            <input type="text" id="batchRepos" placeholder="facebook/react,tensorflow/tensorflow" 
                                   class="w-full pl-12 pr-4 py-4 border-2 border-gray-200 rounded-2xl focus:border-purple-400 focus:ring-4 focus:ring-purple-100 transition-all duration-300 text-lg">
                        </div>
                        <button onclick="analyzeBatch()" 
                                class="mt-4 w-full bg-gradient-to-r from-purple-500 to-purple-600 hover:from-purple-600 hover:to-purple-700 text-white font-bold py-4 px-8 rounded-2xl shadow-xl hover:shadow-2xl transform hover:-translate-y-1 transition-all duration-300 text-lg">
                            <i class="fas fa-bolt mr-2"></i>Analyze Multiple
                        </button>
                    </div>
                </div>
                
                <div class="text-center">
                    <p class="text-sm text-gray-500 mb-4">No GitHub token needed • Rate limited to 60 requests/hour</p>
                    <div class="flex space-x-4">
                        <button onclick="clearResults()" class="px-6 py-2 bg-gray-200 hover:bg-gray-300 text-gray-700 font-medium rounded-xl transition-all duration-200">
                            <i class="fas fa-trash mr-1"></i>Clear Results
                        </button>
                        <button onclick="window.open('/docs', '_blank')" class="px-6 py-2 bg-gradient-to-r from-indigo-500 to-indigo-600 hover:from-indigo-600 hover:to-indigo-700 text-white font-medium rounded-xl shadow-lg hover:shadow-xl transition-all duration-200">
                            <i class="fas fa-cogs mr-1"></i>API Docs
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Loading Spinner -->
        <div id="loading" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
            <div class="bg-white p-8 rounded-3xl shadow-2xl text-center">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500 mx-auto mb-4"></div>
                <p class="text-lg font-semibold text-gray-700">Analyzing repositories...</p>
                <p class="text-sm text-gray-500 mt-1" id="loadingText">Fetching GitHub data</p>
            </div>
        </div>

        <!-- Results Section -->
        <div id="results" class="space-y-8">
            <!-- Results will be dynamically inserted here -->
        </div>
    </div>

    <script>
        async function analyzeSingle() {
            const repo = document.getElementById('singleRepo').value.trim();
            if (!repo.includes('/')) {
                alert('Please enter repo in format: owner/repo');
                return;
            }
            showLoading('Analyzing ' + repo + '...');
            try {
                const response = await fetch(`/analyze?repo=${encodeURIComponent(repo)}`);
                const data = await response.json();
                hideLoading();
                displayResult(data, repo);
            } catch (error) {
                hideLoading();
                alert('Error: ' + error.message);
            }
        }

        async function analyzeBatch() {
            const repos = document.getElementById('batchRepos').value.trim();
            if (!repos) return;
            
            showLoading('Analyzing ' + repos.split(',').length + ' repositories...');
            try {
                const response = await fetch(`/analyze-batch?repos=${encodeURIComponent(repos)}`);
                const data = await response.json();
                hideLoading();
                data.repositories.forEach((result, index) => {
                    displayResult(result, result.repository || 'Unknown');
                });
            } catch (error) {
                hideLoading();
                alert('Error: ' + error.message);
            }
        }

        function showLoading(text) {
            document.getElementById('loadingText').textContent = text;
            document.getElementById('loading').classList.remove('hidden');
        }

        function hideLoading() {
            document.getElementById('loading').classList.add('hidden');
        }

        function displayResult(data, repoName) {
            const resultsDiv = document.getElementById('results');
            
            let html = `
                <div class="repo-card bg-white rounded-3xl shadow-2xl p-8 border-l-8 border-blue-500 hover:shadow-3xl">
                    <div class="flex items-start justify-between mb-6">
                        <div>
                            <h2 class="text-2xl font-bold text-gray-800">${repoName}</h2>
                            <a href="${data.url || '#'}" target="_blank" class="text-blue-500 hover:text-blue-600 font-medium flex items-center mt-1">
                                <i class="fab fa-github mr-1"></i>View on GitHub
                            </a>
                            <p class="text-gray-600 mt-2">${data.description || 'No description'}</p>
                        </div>
                        <div class="text-right">
                            <div class="text-3xl font-bold text-gray-800">${data.learning_difficulty}</div>
                            <div class="text-sm text-gray-500 capitalize">${data.learning_difficulty.toLowerCase()}</div>
                        </div>
                    </div>
            `;

            // Scores
            html += `
                    <div class="grid md:grid-cols-2 gap-6 mb-8">
                        <div>
                            <div class="flex items-center mb-2">
                                <i class="fas fa-fire text-orange-500 mr-2"></i>
                                <span class="font-semibold text-gray-700">Activity Score</span>
                            </div>
                            <div class="relative">
                                <div class="w-full bg-gray-200 rounded-full h-6">
                                    <div class="score-bar h-6 rounded-full" style="width: ${data.activity_score}%"></div>
                                </div>
                                <div class="absolute inset-0 flex items-center justify-center font-bold text-lg">${data.activity_score}/100</div>
                            </div>
                            <p class="text-sm text-gray-500 mt-2">${data.activity_details.level} - ${data.activity_details.summary}</p>
                        </div>
                        <div>
                            <div class="flex items-center mb-2">
                                <i class="fas fa-puzzle-piece text-purple-500 mr-2"></i>
                                <span class="font-semibold text-gray-700">Complexity Score</span>
                            </div>
                            <div class="relative">
                                <div class="w-full bg-gray-200 rounded-full h-6">
                                    <div class="score-bar h-6 rounded-full" style="width: ${data.complexity_score}%"></div>
                                </div>
                                <div class="absolute inset-0 flex items-center justify-center font-bold text-lg">${data.complexity_score}/100</div>
                            </div>
                            <p class="text-sm text-gray-500 mt-2">${data.complexity_details.level} - ${data.complexity_details.summary}</div>
                        </div>
                    </div>
                </div>
            `;

            // Metrics grid
            html += `
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                        <div class="text-center p-4 bg-gray-50 rounded-xl">
                            <div class="text-2xl font-bold text-yellow-500">${data.metrics.stars.toLocaleString()}</div>
                            <div class="text-sm text-gray-500">Stars</div>
                        </div>
                        <div class="text-center p-4 bg-gray-50 rounded-xl">
                            <div class="text-2xl font-bold text-green-500">${data.metrics.forks.toLocaleString()}</div>
                            <div class="text-sm text-gray-500">Forks</div>
                        </div>
                        <div class="text-center p-4 bg-gray-50 rounded-xl">
                            <div class="text-2xl font-bold text-blue-500">${data.metrics.contributors}</div>
                            <div class="text-sm text-gray-500">Contributors</div>
                        </div>
                        <div class="text-center p-4 bg-gray-50 rounded-xl">
                            <div class="text-2xl font-bold text-red-500">${data.metrics.open_issues}</div>
                            <div class="text-sm text-gray-500">Open Issues</div>
                        </div>
                    </div>
            `;

            // Recommendation
            html += `
                    <div class="bg-gradient-to-r from-green-50 to-blue-50 p-6 rounded-2xl border-l-8 border-green-400">
                        <div class="flex items-start">
                            <i class="fas fa-lightbulb text-2xl text-yellow-400 mt-1 mr-4 flex-shrink-0"></i>
                            <div>
                                <h3 class="font-bold text-xl text-gray-800 mb-2">Recommendation</h3>
                                <p class="text-gray-700">${data.recommendation}</p>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            resultsDiv.insertAdjacentHTML('beforeend', html);
        }

        function clearResults() {
            document.getElementById('results').innerHTML = '';
            document.getElementById('singleRepo').value = '';
            document.getElementById('batchRepos').value = '';
        }

        // Enter key support
        document.getElementById('singleRepo').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') analyzeSingle();
        });
        document.getElementById('batchRepos').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') analyzeBatch();
        });
    </script>
</body>
</html>
